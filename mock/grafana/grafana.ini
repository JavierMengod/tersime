[server]
# Prefijo /grafana/ necesario para que el proxy de Laravel funcione.
# Con serve_from_sub_path todos los assets y llamadas API usan /grafana/...
# de modo que el navegador los pide siempre a través del proxy de Laravel.
root_url = http://5.182.36.252/grafana/
serve_from_sub_path = true

[auth.proxy]
enabled = true
header_name = X-WEBAUTH-USER
header_property = email
auto_sign_up = true
# Sin restricción de IP porque Laravel y Grafana pueden estar en redes Docker distintas.
# La seguridad real viene de que /grafana/* en Laravel requiere sesión activa.
whitelist =
enable_login_token = false

[auth.anonymous]
enabled = false

[security]
allow_embedding = true

[dataproxy]
timeout = 120
dial_timeout = 10
keep_alive_seconds = 30
